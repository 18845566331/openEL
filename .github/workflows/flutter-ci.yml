name: Flutter Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Install dependencies
      working-directory: frontend
      run: flutter pub get

    - name: Analyze code
      working-directory: frontend
      run: flutter analyze

    - name: Run tests
      working-directory: frontend
      run: flutter test
